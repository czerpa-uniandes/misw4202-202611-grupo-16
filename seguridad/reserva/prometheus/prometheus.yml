global:
  scrape_interval: 5s

scrape_configs:
  - job_name: api_gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['api_gateway:5000']

  - job_name: clientes_service
    metrics_path: /metrics
    static_configs:
      - targets: ['clientes_service:5000']

  - job_name: reservas_service
    metrics_path: /metrics
    static_configs:
      - targets: ['reservas_service:5000']
